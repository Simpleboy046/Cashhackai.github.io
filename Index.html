<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CashHack AI Pro</title>  <!-- Firebase SDK -->  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white; }
    header { display:flex; justify-content:space-between; padding:15px 30px; background:#020617; }
    nav a { color:#94a3b8; margin:0 10px; text-decoration:none; }
    .hero { text-align:center; padding:80px 20px; }
    .btn { padding:12px 25px; background:#22c55e; border:none; border-radius:8px; cursor:pointer; }
    .section { padding:40px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
    .card { background:#1e293b; padding:20px; border-radius:12px; }
    input { padding:10px; margin:5px; border-radius:6px; border:none; }
    footer { text-align:center; padding:20px; background:#020617; }
  </style></head>
<body><header>
  <h2>CashHack AI 🚀</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#tools">AI Tools</a>
    <a href="#login">Login</a>
  </nav>
</header><section class="hero">
  <h1>Build Income with AI 💰</h1>
  <button class="btn">Start Now</button>
</section><section class="section" id="tools">
  <h2>🔥 AI Tools</h2>
  <div class="grid">
    <div class="card">Content AI</div>
    <div class="card">Image AI</div>
    <div class="card">Chat AI</div>
  </div>
</section><section class="section" id="login">
  <h2>🔐 Login / Signup</h2>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button class="btn" onclick="signup()">Sign Up</button>
  <button class="btn" onclick="login()">Login</button>
  <button class="btn" onclick="logout()">Logout</button>
</section><footer>
  © 2026 CashHack AI Pro
</footer><script>
  // 🔥 REPLACE THIS WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function signup(){
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => alert('Signup Successful'))
      .catch(err => alert(err.message));
  }

  function login(){
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => alert('Login Successful'))
      .catch(err => alert(err.message));
  }

  function logout(){
    auth.signOut();
    alert('Logged Out');
  }
</script></body>
</html>
